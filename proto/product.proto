syntax = "proto3";

package product;

// Tùy chỉnh đường dẫn output cho Golang
option go_package = "./proto/product";

// import package
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// product service
service ProductService {
    // create product
    rpc CreateProduct(CreateProductDto) returns (ProductResponse);
    // get list
    rpc GetListProduct(GetListProductDto) returns (ListProductResponse);
}

// inventory
message InventoryResponse {
    string id = 1;
    int64 available_stock = 2;
    int64 reserved_stock = 3;
}

// product message
message ProductResponse {
  string id = 1; // Convert từ hex string của ObjectID
  string name = 2;
  string price = 3; // Dùng string để giữ độ chính xác của Decimal128
  google.protobuf.Struct attributes = 4;
  repeated string images = 5;
  bool is_active = 6;
  InventoryResponse inventory_info = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// create product dto
message CreateProductDto {
    string name = 1;
    string price = 2;
    google.protobuf.Struct attributes = 3;
    repeated string images = 4;
    int64 quantity = 5;
}

// get list
message GetListProductDto {
    int64 page = 1;
    int64 limit = 2;
    string order_by = 3;
    string sort = 4;
}

// list product response
message ListProductResponse {
    repeated ProductResponse items = 1;
    int64 total = 2;
    int64 page = 3;
    int64 limit = 4;
    bool has_next = 5;
    bool has_prev = 6;
}


